<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap" rel="stylesheet">

    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <title>Project</title>
    <style>
body {
    background-color: #140932;
    color: #f1f0fd;
    font-family: "Kumbh Sans", sans-serif;
    text-align: center;
    padding: 20px;
}

input {
    display: block;
    margin: 10px auto;
    padding: 10px;
    width: 250px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 0 20px;
    box-sizing: border-box;

    background: linear-gradient(90deg, #292551 0%, #231c51 100%);
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    z-index: 1000;
}
.container {
    padding: 30px 35px;
    border-radius: 12px;
    width: 340px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
    box-sizing: border-box;
    gap: 40px;
}

.nav-title {
    color: white;
    font-weight: bold;
}

.nav-links {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

.nav-links a {
    white-space: nowrap;
    font-size: 14px;
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    padding: 8px 16px;
    border-radius: 6px;
    background-color: rgba(27,27,27,0.6);
    transition: background-color 0.3s, color 0.3s;
}

.nav-links a:hover {
    background-color: #a9a3ff;
    color: #111;
}

.add-btn {
    background-color: #bbb9e6; 
    color: rgb(20, 18, 46); 
}
.show-btn {
    background-color: #323144; 
    color: rgb(212, 206, 255); 
}

#output {
    margin-top: 20px;
    padding: 15px;
    background: rgba(208, 198, 241, 0.874);
    color:#2d2c4e;
    border-radius: 10px;
}
footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    text-align: center;
    padding: 10px 0;
    color: #f1f0fd;
    font-size: 14px;
    border-top: 1px solid #ff69b4;
}
    </style>
</head>
<body>

<nav>
    <span class="nav-title">10-Sapphire</span>
    <div class="nav-links">
        <a href="index.html">Classmates</a>
        <a href="attendance.html">Attendance Tracker</a>
        <a href="gallery.html">Gallery</a>
    </div>
</nav>

<div class="container" id="system"></div>

    <h1>Grade 10 Classmates System</h1>
    <p>Add and view your classmates easily</p>

    <input type="text" id="name" placeholder="Enter name">
    <input type="text" id="section" placeholder="Enter section">
    <input type="text" id="subject" placeholder="Favorite subject">

    <button class="add-btn" py-click="add_classmate">Add Classmate</button>
    <button class="show-btn" py-click="show_classmates">Show List</button>

    <div id="output"></div>
    <footer>
    Atasha Ko & Alijah Lagman | 10-Sapphire
</footer>

    <py-script src="system.py"></py-script>
</body>
</html>
